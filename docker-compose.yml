version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: padel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: padel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: padel_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/padel_db
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api
      JWT_SECRET: your-super-secret-jwt-key-min-32-characters-here
      JWT_EXPIRES_IN: 900
      JWT_REFRESH_SECRET: your-refresh-secret-key-min-32-characters-here
      JWT_REFRESH_EXPIRES_IN: 604800
      CORS_ORIGIN: http://localhost:3001,http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma

volumes:
  postgres_data:
